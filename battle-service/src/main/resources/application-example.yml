server:
  port: 8082

spring:
  application:
    name: battle-service

  datasource:
    url: jdbc:postgresql://localhost:5434/your_db
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: your_rabbit_user
    password: your_rabbit_password

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/your-realm
          jwk-set-uri: http://localhost:8180/realms/your-realm/protocol/openid-connect/certs

services:
  user-service:
    url: http://localhost:8081
  ai-service:
    url: http://localhost:8083

resilience4j:
  circuitbreaker:
    instances:
      userService:
        slidingWindowSize: 10
        failureRateThreshold: 50
      aiService:
        slidingWindowSize: 5
        failureRateThreshold: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.yourpackage.battle: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html